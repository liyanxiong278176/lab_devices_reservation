spring:
  # Spring Boot 3.x 禁止在 profile 专属文件里用 spring.profiles.include(InvalidConfigDataPropertyException)。
  # 改用 config.import 加载 gitignored 的 application-siliconflow.yml(chat+embedding 密钥);
  # optional: 前缀保证文件缺失不报错(本机有,服务器无)。
  config:
    import: "optional:classpath:application-siliconflow.yml"
  datasource:
    url: jdbc:mysql://localhost:3306/lab_reservation?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
logging:
  level:
    com.lab.reservation: debug
lab:
  lock:
    wait-seconds: 3
  recommend:
    weights:
      alpha: 0.4
      beta: 0.2
      gamma: 0.25
      delta: 0.1
      epsilon: 0.3
    cache-ttl-minutes: 5
  dashboard:
    cache-ttl-minutes: 5
  reservation:
    signin-grace-minutes: 30
  task:
    notify:
      idempotent-ttl-hours: 24
    timeout:
      scan-interval-ms: 5000
      batch-size: 100
