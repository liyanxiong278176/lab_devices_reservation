# 顶级 name 固定项目名为 labprod：避免与 dev 的 docker-compose.yml（默认目录项目名）
# 同名 service(mysql/redis/rabbitmq) 碰撞导致 prod up 误重建 dev 容器。
# 这样 `docker compose -f docker-compose.prod.yml up -d` 即安全，无需每次带 -p labprod。
name: labprod

services:
  mysql:
    image: mysql:8.0
    container_name: lab-mysql-prod
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: lab_reservation
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes: ["mysql_data:/var/lib/mysql"]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes: ["redis_data:/data"]
  app:
    build: .
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
  frontend:
    build: ./frontend
    ports: ["80:80"]
    depends_on: [app]
volumes:
  mysql_data:
  redis_data:
