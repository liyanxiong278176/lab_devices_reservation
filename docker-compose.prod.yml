# 顶级 name 固定项目名为 labprod：避免与 dev 的 docker-compose.yml（默认目录项目名）
# 同名 service(mysql/redis) 碰撞导致 prod up 误重建 dev 容器。
# 这样 `docker compose -f docker-compose.prod.yml up -d` 即安全，无需每次带 -p labprod。
#
# ============================================================
# 默认值策略：所有 ${VAR} 都有 :-default 兜底
#   - 不写 .env 也能起来（适合"先跑起来再说"）
#   - 想要强密码：在项目根写 .env 文件覆盖即可
#   - 4G 机器内存分配：mysql 512M / redis 128M / app 768M / frontend 64M
# ============================================================
name: labprod

services:
  mysql:
    image: mysql:8.0
    container_name: lab-mysql-prod
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-LabSecurePwd2026}
      MYSQL_DATABASE: lab_reservation
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    volumes: ["mysql_data:/var/lib/mysql"]
    # 公网直连:监听 0.0.0.0 让外部直接访问。腾讯云安全组务必限制源 IP 或确认 DB_PASSWORD 是强密码!
    ports:
      - "0.0.0.0:3306:3306"
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-LabSecurePwd2026}"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes: ["redis_data:/data"]
    # 公网直连:监听 0.0.0.0 让外部直接访问。腾讯云安全组务必限制源 IP 或确认没有 requirepass 风险!
    ports:
      - "0.0.0.0:6379:6379"
    mem_limit: 128m
  app:
    build: .
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-LabSecurePwd2026}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod-this-must-be-at-least-32-bytes-long}
      # AI per-user key:master key 加密用户存 DB 的 chat key,必需(prod 禁用 dev 派生 key)。
      # 生成:openssl rand -base64 32,写进服务器 .env。chat key 零进服务器(用户在 UI 自配)。
      AI_MASTER_KEY: ${AI_MASTER_KEY:?set AI_MASTER_KEY in .env (run openssl rand -base64 32)}
      # RAG(embedding)系统级可选:默认 none=关;要检索设备手册才在 .env 设 openai + 下面的 key。
      SPRING_AI_MODEL_EMBEDDING: ${SPRING_AI_MODEL_EMBEDDING:-none}
      SPRING_AI_VECTORSTORE_TYPE: ${SPRING_AI_VECTORSTORE_TYPE:-none}
      SPRING_AI_OPENAI_EMBEDDING_API_KEY: ${SPRING_AI_OPENAI_EMBEDDING_API_KEY:-}
      SPRING_AI_OPENAI_EMBEDDING_BASE_URL: ${SPRING_AI_OPENAI_EMBEDDING_BASE_URL:-}
      SPRING_AI_OPENAI_EMBEDDING_OPTIONS_MODEL: ${SPRING_AI_OPENAI_EMBEDDING_OPTIONS_MODEL:-BAAI/bge-m3}
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8080/api/actuator/health 2>/dev/null | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports: ["80:80"]
    depends_on:
      app: { condition: service_healthy }
    mem_limit: 64m
volumes:
  mysql_data:
  redis_data:
